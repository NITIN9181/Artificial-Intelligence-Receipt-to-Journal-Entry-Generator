    environment:
      NEXT_PUBLIC_SUPABASE_URL: https://chazqctmrgyaewmlpgjv.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoYXpxY3Rtcmd5YWV3bWxwZ2p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDA1NTIsImV4cCI6MjA5MzQ3NjU1Mn0.bKnyt7jGpC1dQPxp_ufZM47Q3vvOpXaOatqxXhVmwBA
