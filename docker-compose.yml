version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ENVIRONMENT
# ──────────────────────────────────────────────────────────────────────────────
# IMPORTANT: This Docker Compose setup uses MinIO for local storage instead of
# Supabase Storage to avoid requiring cloud connectivity during development.
#
# ENVIRONMENT PARITY NOTE:
# - Production: Uses Supabase Storage (cloud-based S3-compatible storage)
# - Local: Uses MinIO (self-hosted S3-compatible storage in Docker)
#
# The backend code (backend/app/services/storage.py) abstracts this difference
# and automatically detects which storage backend to use based on environment
# variables. Both provide the same S3-compatible API interface.
#
# To switch to Supabase Storage locally, set SUPABASE_STORAGE_BUCKET env var.
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: receipt_journal
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d receipt_journal" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # MinIO: S3-compatible object storage for local development
    # In production, replace with SUPABASE_STORAGE_BUCKET environment variable
    # to use Supabase Storage instead
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console (http://localhost:9001)

  fastapi:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:changeme@postgres:5432/receipt_journal
      SUPABASE_URL: https://chazqctmrgyaewmlpgjv.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoYXpxY3Rtcmd5YWV3bWxwZ2p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDA1NTIsImV4cCI6MjA5MzQ3NjU1Mn0.bKnyt7jGpC1dQPxp_ufZM47Q3vvOpXaOatqxXhVmwBA
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoYXpxY3Rtcmd5YWV3bWxwZ2p2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzkwMDU1MiwiZXhwIjoyMDkzNDc2NTUyfQ.SUVihJsnrUf9FWBKTyBGXGdyL0v1HtNKu-y8IIMkeLI
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
